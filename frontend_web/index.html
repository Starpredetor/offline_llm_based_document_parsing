<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline RAG Workspace</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <header class="topbar">
    <a id="home-link" class="brand" href="#/dashboard">
      <span class="brand-mark">R</span>
      <span>
        <strong>Offline RAG</strong>
        <small>Document question answering</small>
      </span>
    </a>
    <span id="status-pill" class="status-pill">Ready</span>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <button id="sidebar-new-project" class="button primary full" type="button">New Project</button>

      <nav class="nav" aria-label="Main navigation">
        <button class="nav-button active" type="button" data-view="dashboard">Dashboard</button>
        <button class="nav-button" type="button" data-view="workspace">Chat</button>
      </nav>

      <div class="sidebar-section">
        <h2>Projects</h2>
        <div id="shell-projects" class="stack"></div>
      </div>
    </aside>

    <main class="main">
      <section id="view-dashboard" class="view active">
        <div class="page-head">
          <div>
            <p class="eyebrow">Overview</p>
            <h1>Dashboard</h1>
          </div>
          <button id="dashboard-create-project" class="button primary" type="button">Create Project</button>
        </div>

        <div id="dashboard-cards" class="metric-grid"></div>

        <div class="two-column">
          <section class="panel">
            <h2>Recent Projects</h2>
            <div id="recent-projects" class="stack"></div>
          </section>

          <section class="panel">
            <h2>Recent Chats</h2>
            <div id="recent-chats" class="stack"></div>
          </section>
        </div>
      </section>

      <section id="view-create-project" class="view">
        <div class="page-head compact">
          <div>
            <p class="eyebrow">Set up documents</p>
            <h1>Create Project</h1>
          </div>
        </div>

        <section class="panel form-panel">
          <form id="project-form">
            <label for="project-name">Project name</label>
            <input id="project-name" required minlength="2" maxlength="100" placeholder="Example: Research notes" />

            <label for="project-files">Documents</label>
            <div id="project-drop-zone" class="drop-zone" role="button" tabindex="0">
              <strong>Drop files here</strong>
              <span>or click to select files</span>
              <input id="project-files" type="file" multiple hidden />
            </div>

            <div class="inline-title">
              <label>Selected files</label>
              <button id="clear-project-files" class="button secondary small" type="button">Clear</button>
            </div>
            <div id="project-files-preview" class="stack"></div>

            <button id="project-submit-btn" class="button primary full" type="submit">Create Project</button>
            <div id="upload-result" class="notice" aria-live="polite"></div>
          </form>
        </section>
      </section>

      <section id="view-workspace" class="view workspace-view">
        <div class="workspace">
          <section class="chat-panel">
            <div class="workspace-head">
              <div>
                <p class="eyebrow">Current project</p>
                <h1 id="chat-project-name">Default Project</h1>
              </div>
            </div>

            <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

            <form id="chat-form" class="chat-form">
              <textarea id="chat-input" rows="1" placeholder="Ask a question about this project's documents"></textarea>
              <button id="chat-send-btn" class="button primary send-button" type="submit">Send</button>
            </form>
          </section>

          <aside class="documents-panel">
            <section class="panel">
              <h2>Documents</h2>
              <div class="search">
                <input id="doc-search" placeholder="Search documents" />
              </div>
              <div class="upload-row">
                <input id="chat-upload-files" type="file" multiple />
                <button id="chat-upload-btn" class="button primary" type="button">Add Files</button>
              </div>
              <div id="chat-documents" class="stack document-list"></div>
            </section>

            <section class="panel">
              <h2>Sources</h2>
              <div id="source-list" class="stack"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/ui/app.js"></script>
</body>
</html>
